services:
  horizon-dev:
    image: node:24-alpine@sha256:21f403ab171f2dc89bad4dd69d7721bfd15f084ccb46cdd225f31f2bc59b5c9a
    container_name: horizon-dev-frontend
    working_dir: /app/svelte-app
    restart: 'no'
    ports:
      - '5173:5173'
    environment:
      NODE_ENV: 'development'
      VITE_API_PROXY: 'http://horizon-backend:8080'
    env_file:
      - .env
    volumes:
      - ./svelte-app:/app/svelte-app
      - dev_svelte_modules:/app/svelte-app/node_modules
    networks:
      - horizon-network
    command:
      - sh
      - -c
      - |
        corepack enable
        corepack prepare pnpm@latest --activate
        pnpm install
        pnpm run dev -- --host 0.0.0.0

  horizon-backend:
    image: node:24-alpine@sha256:21f403ab171f2dc89bad4dd69d7721bfd15f084ccb46cdd225f31f2bc59b5c9a
    container_name: horizon-backend
    working_dir: /app
    restart: 'no'
    ports:
      - '8080:8080'
    environment:
      NODE_ENV: 'development'
    env_file:
      - .env
    volumes:
      - .:/app
      - dev_modules:/app/node_modules
    networks:
      - horizon-network
    command:
      - sh
      - -c
      - |
        corepack enable
        corepack prepare pnpm@latest --activate
        pnpm install
        node --max-old-space-size=400 server/app.js

volumes:
  dev_modules:
  dev_svelte_modules:

networks:
  horizon-network:
    driver: bridge
