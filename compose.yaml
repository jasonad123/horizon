services:
  horizon:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: horizon
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      NODE_ENV: 'production'
      PORT: '8080'
    env_file:
      - .env
    networks:
      - horizon-network
    healthcheck:
      test: ['CMD-SHELL', 'wget --quiet --tries=1 --spider http://localhost:8080/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  horizon-network:
    driver: bridge
